name: Update Esports Data

on:
  schedule:
    # Her 30 dakikada bir çalışır (GitHub Actions cron'ları gecikebilir, garanti değildir)
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # Manuel tetikleme için (Actions sekmesinden "Run workflow")

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install requests pandas

      - name: LoLEsports maç takvimini çek
        run: python scripts/fetch_lolesports.py

      - name: Leaguepedia sonuçlarını çek
        run: python scripts/fetch_leaguepedia.py

      - name: Oracle's Elixir istatistiklerini çek
        env:
          OE_CSV_URL: ${{ vars.OE_CSV_URL }}
        run: python scripts/fetch_oracles_elixir.py

      - name: Değişiklikleri commit et ve push'la
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: otomatik güncelleme $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
