<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Esports Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #c89b3c;
    --accent2: #785a28;
    --live: #ef4444;
    --blue: #3b82f6;
    --green: #10b981;
    --purple: #8b5cf6;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.5px;
  }

  .logo svg { color: var(--accent); }

  .nav-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  .nav-tab {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .nav-tab:hover { background: var(--bg3); color: var(--text); }
  .nav-tab.active { background: var(--bg3); color: var(--accent); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 8px var(--live);
    animation: pulse 2s infinite;
    display: inline-block;
    margin-right: 6px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 28px;
  }

  .section-title:first-child { margin-top: 0; }

  .match-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .match-card:hover { border-color: rgba(255,255,255,0.18); background: var(--bg3); }
  .match-card.live-card { border-color: rgba(239,68,68,0.25); }
  .match-card.live-card:hover { border-color: rgba(239,68,68,0.45); }

  .match-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: transparent;
  }

  .match-card.live-card::before { background: var(--live); }

  .match-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .league-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    color: var(--accent);
    background: rgba(200,155,60,0.1);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--live);
    letter-spacing: 0.5px;
  }

  .time-badge {
    font-size: 12px;
    color: var(--muted);
  }

  .series-info {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .teams-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
  }

  .team {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .team.right {
    flex-direction: row-reverse;
    text-align: right;
  }

  .team-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    overflow: hidden;
  }

  .team-icon img { width: 100%; height: 100%; object-fit: contain; }

  .team-name {
    font-weight: 700;
    font-size: 15px;
  }

  .team-record {
    font-size: 11px;
    color: var(--muted);
  }

  .score-block {
    text-align: center;
    min-width: 60px;
  }

  .score {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
  }

  .score-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .game-timer {
    font-size: 12px;
    color: var(--green);
    font-variant-numeric: tabular-nums;
    margin-top: 4px;
  }

  .detail-panel {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .detail-panel.open { display: block; }

  .players-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .player-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .player-row:last-child { border-bottom: none; }

  .champ-icon {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    background: var(--bg3);
    overflow: hidden;
    flex-shrink: 0;
  }

  .champ-icon img { width: 100%; height: 100%; object-fit: cover; }

  .player-name { font-weight: 500; flex: 1; }

  .kda {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .kda span { color: var(--text); }

  .cs-gold {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .cs-gold span { color: var(--accent); }

  .items-row {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }

  .item-icon {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    background: var(--bg);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .item-icon img { width: 100%; height: 100%; object-fit: cover; }

  .empty-item {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    background: var(--bg);
    border: 1px solid var(--border);
    opacity: 0.3;
  }

  .bar-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .stat-bar { margin-bottom: 6px; }

  .stat-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .bar-track {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 32px;
    color: var(--muted);
    font-size: 14px;
    justify-content: center;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: #f87171;
    margin: 16px 0;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    padding: 5px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  .header-row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }

  .patch-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg3);
    padding: 3px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }

  .empty-state {
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }

  .team-section-header {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .schedule-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 20px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    align-items: center;
    gap: 16px;
    font-size: 14px;
  }

  .schedule-time {
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    min-width: 80px;
  }

  @media (max-width: 640px) {
    .players-grid { grid-template-columns: 1fr; }
    .teams-row { gap: 8px; }
    .team-name { font-size: 13px; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    LoL Esports Live
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('live')">Live</button>
    <button class="nav-tab" onclick="switchTab('schedule')">Schedule</button>
  </div>
</header>

<div class="main">
  <div id="tab-live" class="tab-content active">
    <div class="header-row">
      <span class="section-title" style="margin:0">Live Matches</span>
      <span id="patch-badge" class="patch-badge" style="display:none"></span>
      <button class="refresh-btn" onclick="loadAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9m-9 9a9 9 0 019-9"/>
        </svg>
        Refresh
      </button>
    </div>
    <div id="live-container"><div class="loading"><div class="spinner"></div> Loading live matches...</div></div>

    <div class="section-title" id="upcoming-title" style="display:none">Upcoming</div>
    <div id="upcoming-container"></div>

    <div class="section-title" id="recent-title" style="display:none">Recent Results</div>
    <div id="recent-container"></div>
  </div>

  <div id="tab-schedule" class="tab-content">
    <div class="header-row">
      <span class="section-title" style="margin:0">Schedule</span>
      <button class="refresh-btn" onclick="loadSchedule()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9m-9 9a9 9 0 019-9"/>
        </svg>
        Refresh
      </button>
    </div>
    <div id="schedule-container"><div class="loading"><div class="spinner"></div> Loading schedule...</div></div>
  </div>
</div>

<script>
const API_PERSISTED = "https://esports-api.lolesports.com/persisted/gw"
const API_PERSISTED2 = "https://prod-relapi.ewp.gg/persisted/gw"
const API_LIVE = "https://feed.lolesports.com/livestats/v1"
const API_KEY = "0TvQnueqKa5mxJntVWt0w4LpLfEkrV1Ta8rQBb9Z"
const DDRAGON = "https://ddragon.leagueoflegends.com/cdn"

let patchVersion = "14.10.1"
let activeGameTimers = {}
let livePollingInterval = null
let currentLiveGames = {}

function headers() {
  return { "x-api-key": API_KEY }
}

async function fetchJSON(path, params = {}) {
  const tryHost = async (host) => {
    const u = new URL(host + '/' + path)
    Object.entries(params).forEach(([k,v]) => u.searchParams.set(k,v))
    const r = await fetch(u.toString(), { headers: headers() })
    if (!r.ok) throw new Error(`HTTP ${r.status}`)
    return r.json()
  }
  try {
    return await tryHost(API_PERSISTED)
  } catch(e) {
    return await tryHost(API_PERSISTED2)
  }
}

async function fetchLive(url, params = {}) {
  const u = new URL(url)
  Object.entries(params).forEach(([k,v]) => u.searchParams.set(k,v))
  const r = await fetch(u.toString())
  if (!r.ok) throw new Error(`HTTP ${r.status}`)
  return r.json()
}

function getISODate10s() {
  const d = new Date()
  d.setMilliseconds(0)
  const s = d.getSeconds()
  d.setSeconds(s - (s % 10) - 60)
  return d.toISOString()
}

function formatTime(iso) {
  const d = new Date(iso)
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
}

function teamInitials(name) {
  if (!name) return '?'
  const words = name.trim().split(/\s+/)
  if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase()
  return name.slice(0,3).toUpperCase()
}

function colorForTeam(idx) {
  return idx === 0 ? '#3b82f6' : '#ef4444'
}

function renderTeamIcon(team, size = 36) {
  const img = team?.image
  const code = team?.code || teamInitials(team?.name || '?')
  if (img) {
    return `<div class="team-icon" style="width:${size}px;height:${size}px"><img src="${img}" alt="${code}" onerror="this.style.display='none'"></div>`
  }
  return `<div class="team-icon" style="width:${size}px;height:${size}px">${code}</div>`
}

function renderChampIcon(champName) {
  if (!champName) return `<div class="champ-icon"></div>`
  const cleanName = champName.replace(/['\s]/g,'').replace(/\./g,'')
  const url = `${DDRAGON}/${patchVersion}/img/champion/${cleanName}.png`
  return `<div class="champ-icon"><img src="${url}" alt="${champName}" onerror="this.parentElement.style.background='var(--bg3)'"></div>`
}

function renderItemIcons(items = []) {
  const slots = Array(7).fill(null)
  items.forEach((id, i) => { if (i < 7) slots[i] = id })
  return slots.map(id => {
    if (!id || id === 0) return `<div class="empty-item"></div>`
    return `<div class="item-icon"><img src="${DDRAGON}/${patchVersion}/img/item/${id}.png" alt="${id}" onerror="this.style.display='none'"></div>`
  }).join('')
}

function renderKDA(kills, deaths, assists) {
  const k = kills ?? 0, d = deaths ?? 0, a = assists ?? 0
  const kda = d === 0 ? 'Perfect' : ((k + a) / d).toFixed(2)
  return `<div class="kda"><span>${k}</span>/<span style="color:var(--live)">${d}</span>/<span>${a}</span> <span style="margin-left:4px">${kda}</span></div>`
}

function renderTeamStats(teamData, color) {
  const players = teamData?.participants || []
  return `<div>
    ${players.map(p => `
    <div class="player-row">
      ${renderChampIcon(p.championId)}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="player-name">${p.summonerName || p.participantId}</span>
          ${renderKDA(p.kills, p.deaths, p.assists)}
        </div>
        <div class="items-row">
          ${renderItemIcons(p.items)}
        </div>
      </div>
      <div class="cs-gold">
        <div>${p.creepScore ?? 0} CS</div>
        <div><span>${Math.round((p.totalGold || 0)/1000)}k</span></div>
      </div>
    </div>`).join('')}
  </div>`
}

async function loadWindowData(gameId) {
  try {
    const data = await fetchLive(`${API_LIVE}/window/${gameId}`, { startingTime: getISODate10s() })
    return data
  } catch(e) {
    return null
  }
}

async function loadDetails(gameId) {
  try {
    const data = await fetchLive(`${API_LIVE}/details/${gameId}`, { startingTime: getISODate10s() })
    return data
  } catch(e) {
    return null
  }
}

function renderMatchCard(event, isLive = false, isRecent = false) {
  const match = event?.match
  if (!match) return ''
  const teams = match.teams || []
  const t1 = teams[0] || {}
  const t2 = teams[1] || {}
  const s1 = t1.result?.gameWins ?? 0
  const s2 = t2.result?.gameWins ?? 0
  const league = event?.league?.name || ''
  const startTime = event?.startTime ? formatTime(event.startTime) : ''
  const strategy = match?.strategy
  const seriesText = strategy?.type === 'bestOf' ? `Best of ${strategy.count}` : ''
  const id = match?.id || event?.id || ''

  let badgeHtml = ''
  if (isLive) badgeHtml = `<div class="live-badge"><span class="status-dot"></span>LIVE</div>`
  else if (isRecent) badgeHtml = `<div class="time-badge">${startTime}</div>`
  else badgeHtml = `<div class="time-badge">${startTime}</div>`

  return `<div class="match-card ${isLive ? 'live-card' : ''}" id="card-${id}" onclick="toggleDetail('${id}')">
    <div class="match-top">
      <div>
        <span class="league-badge">${league}</span>
        ${seriesText ? `<div class="series-info">${seriesText}</div>` : ''}
      </div>
      ${badgeHtml}
    </div>
    <div class="teams-row">
      <div class="team">
        ${renderTeamIcon(t1)}
        <div>
          <div class="team-name">${t1.code || t1.name || 'TBD'}</div>
          <div class="team-record">${t1.name || ''}</div>
        </div>
      </div>
      <div class="score-block">
        <div class="score">${s1} <span style="color:var(--muted);font-size:16px">–</span> ${s2}</div>
        ${isLive ? `<div class="game-timer" id="timer-${id}">● Live</div>` : ''}
      </div>
      <div class="team right">
        ${renderTeamIcon(t2)}
        <div>
          <div class="team-name">${t2.code || t2.name || 'TBD'}</div>
          <div class="team-record">${t2.name || ''}</div>
        </div>
      </div>
    </div>
    <div class="detail-panel" id="detail-${id}">
      <div class="loading"><div class="spinner"></div> Loading game data...</div>
    </div>
  </div>`
}

async function toggleDetail(id) {
  const panel = document.getElementById(`detail-${id}`)
  if (!panel) return
  if (panel.classList.contains('open')) {
    panel.classList.remove('open')
    return
  }
  panel.classList.add('open')
  panel.innerHTML = `<div class="loading"><div class="spinner"></div> Loading game data...</div>`

  const win = await loadWindowData(id)
  if (!win) {
    panel.innerHTML = `<div class="error-msg">Could not load live data for this game. It may have ended.</div>`
    return
  }

  const gameMetadata = win.gameMetadata
  const frames = win.frames || []
  const lastFrame = frames[frames.length - 1]

  if (!lastFrame) {
    panel.innerHTML = `<div class="error-msg">No frame data available yet.</div>`
    return
  }

  const blueTeam = lastFrame.blueTeam
  const redTeam = lastFrame.redTeam

  const blueGold = blueTeam?.totalGold || 0
  const redGold = redTeam?.totalGold || 0
  const totalGold = blueGold + redGold || 1

  const blueTowers = blueTeam?.inhibitors ?? blueTeam?.towers ?? 0
  const redTowers = redTeam?.inhibitors ?? redTeam?.towers ?? 0

  panel.innerHTML = `
    <div class="bar-group">
      <div class="stat-bar">
        <div class="stat-label"><span>Blue Gold</span><span style="color:var(--accent)">${Math.round(blueGold/1000)}k</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(blueGold/totalGold*100)}%;background:#3b82f6"></div></div>
      </div>
      <div class="stat-bar">
        <div class="stat-label"><span>Red Gold</span><span style="color:var(--accent)">${Math.round(redGold/1000)}k</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(redGold/totalGold*100)}%;background:#ef4444"></div></div>
      </div>
    </div>
    <div class="players-grid">
      <div>
        <div class="team-section-header" style="color:#3b82f6">Blue Side</div>
        ${renderTeamStats(blueTeam, '#3b82f6')}
      </div>
      <div>
        <div class="team-section-header" style="color:#ef4444">Red Side</div>
        ${renderTeamStats(redTeam, '#ef4444')}
      </div>
    </div>`
}

async function loadLiveMatches() {
  const container = document.getElementById('live-container')
  try {
    const data = await fetchJSON('getLive', { hl: 'en-US' })
    const events = data?.data?.schedule?.events || []
    const live = events.filter(e => e.state === 'inProgress' || e.type === 'match')

    if (live.length === 0) {
      container.innerHTML = `<div class="empty-state">No live matches right now.</div>`
    } else {
      container.innerHTML = live.map(e => renderMatchCard(e, true)).join('')
    }
    return events
  } catch(e) {
    container.innerHTML = `<div class="error-msg">Could not load live data. API may be unavailable or blocked by CORS.</div>`
    return []
  }
}

async function loadScheduleEvents() {
  try {
    const data = await fetchJSON('getSchedule', { hl: 'en-US' })
    const events = data?.data?.schedule?.events || []
    return events
  } catch(e) {
    return []
  }
}

async function loadAll() {
  document.getElementById('live-container').innerHTML = `<div class="loading"><div class="spinner"></div> Loading...</div>`
  document.getElementById('upcoming-container').innerHTML = ''
  document.getElementById('recent-container').innerHTML = ''
  document.getElementById('upcoming-title').style.display = 'none'
  document.getElementById('recent-title').style.display = 'none'

  // Live matches - getLive endpoint
  try {
    const liveData = await fetchJSON('getLive', { hl: 'en-US' })
    const liveEvents = liveData?.data?.schedule?.events || []
    const liveContainer = document.getElementById('live-container')
    if (liveEvents.length > 0) {
      liveContainer.innerHTML = liveEvents.map(e => renderMatchCard(e, true)).join('')
    } else {
      liveContainer.innerHTML = `<div class="empty-state">No live matches right now.</div>`
    }
  } catch(e) {
    document.getElementById('live-container').innerHTML = `<div class="error-msg">Could not load live data: ${e.message}</div>`
  }

  // Schedule - upcoming and recent
  try {
    const schedData = await fetchJSON('getSchedule', { hl: 'en-US' })
    const events = (schedData?.data?.schedule?.events || []).filter(e => e.type === 'match')
    const upcoming = events.filter(e => e.state === 'unstarted').slice(0, 8)
    const recent = events.filter(e => e.state === 'completed').slice(-6).reverse()

    if (upcoming.length > 0) {
      document.getElementById('upcoming-title').style.display = 'block'
      document.getElementById('upcoming-container').innerHTML = upcoming.map(e => renderMatchCard(e, false, false)).join('')
    }
    if (recent.length > 0) {
      document.getElementById('recent-title').style.display = 'block'
      document.getElementById('recent-container').innerHTML = recent.map(e => renderMatchCard(e, false, true)).join('')
    }
  } catch(e) {}
}

async function loadSchedule() {
  const container = document.getElementById('schedule-container')
  container.innerHTML = `<div class="loading"><div class="spinner"></div> Loading...</div>`

  try {
    const data = await fetchJSON('getSchedule', { hl: 'en-US' })
    const events = (data?.data?.schedule?.events || []).filter(e => e.type === 'match')

    if (events.length === 0) {
      container.innerHTML = `<div class="empty-state">No schedule data available.</div>`
      return
    }

    const grouped = {}
    events.forEach(e => {
      const league = e.league?.name || 'Other'
      if (!grouped[league]) grouped[league] = []
      grouped[league].push(e)
    })

    let html = ''
    Object.entries(grouped).forEach(([league, evts]) => {
      html += `<div class="section-title">${league}</div>`
      evts.slice(0, 10).forEach(e => {
        const m = e.match
        const teams = m?.teams || []
        const t1 = teams[0] || {}
        const t2 = teams[1] || {}
        const s1 = t1.result?.gameWins ?? ''
        const s2 = t2.result?.gameWins ?? ''
        const state = e.state
        const stateColor = state === 'inProgress' ? 'var(--live)' : state === 'completed' ? 'var(--muted)' : 'var(--green)'
        html += `<div class="schedule-item">
          <div style="font-weight:600">${t1.code || t1.name || 'TBD'}</div>
          <div style="text-align:center;font-variant-numeric:tabular-nums">
            ${state === 'completed' ? `<span style="font-weight:700">${s1} – ${s2}</span>` : `<span style="color:var(--muted)">vs</span>`}
          </div>
          <div style="font-weight:600;text-align:right">${t2.code || t2.name || 'TBD'}</div>
          <div class="schedule-time" style="color:${stateColor}">
            ${state === 'inProgress' ? '● LIVE' : state === 'completed' ? 'Final' : formatTime(e.startTime)}
          </div>
        </div>`
      })
    })
    container.innerHTML = html
  } catch(e) {
    container.innerHTML = `<div class="error-msg">Could not load schedule. CORS may be blocking the request — try opening this file via a local server or a CORS-friendly browser.</div>`
  }
}

async function fetchPatchVersion() {
  try {
    const r = await fetch('https://ddragon.leagueoflegends.com/api/versions.json')
    const versions = await r.json()
    if (versions && versions[0]) {
      patchVersion = versions[0]
      const badge = document.getElementById('patch-badge')
      badge.textContent = `Patch ${versions[0].split('.').slice(0,2).join('.')}`
      badge.style.display = 'inline-block'
    }
  } catch(e) {}
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'))
  document.getElementById(`tab-${name}`).classList.add('active')
  event.target.classList.add('active')
  if (name === 'schedule') loadSchedule()
}

fetchPatchVersion()
loadAll()
setInterval(loadAll, 60000)
</script>
